board = xiaoble_adafruit
framework = arduino
monitor_speed = 115200
lib_deps = 
	adafruit/Adafruit SPIFlash@^4.1.1
	adafruit/SdFat - Adafruit Fork@^2.2.1
	luisllamasbinaburo/MedianFilterLib@^1.0.1
